<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0A0806;
  --bg2: #0F0C09;
  --surface: #141008;
  --card: #1A1510;
  --border: #2A2018;
  --border2: #342C1C;
  --text: #F2E8D8;
  --text-muted: #7A6A54;
  --text-dim: #3A3020;
  --accent: #E8702A;
  --accent2: #C85820;
  --accent-soft: #261408;
  --gold: #D4A830;
  --gold-soft: #201808;
  --green: #4AAA70;
  --glow-accent: rgba(232,112,42,0.15);
  --glow-gold: rgba(212,168,48,0.1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ── NOISE TEXTURE ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: rgba(10,8,6,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 48px;
  z-index: 100;
  gap: 32px;
}

.nav-brand {
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--text);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 3px;
}

.nav-brand span { color: var(--accent); }

nav ul {
  list-style: none;
  display: flex;
  gap: 24px;
  margin-left: auto;
  align-items: center;
}

nav ul a {
  font-size: 13px;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.15s;
}

nav ul a:hover { color: var(--text); }

.nav-cta {
  padding: 8px 18px;
  background: var(--accent);
  color: #fff !important;
  border-radius: 7px;
  font-weight: 500;
  transition: background 0.15s !important;
}

.nav-cta:hover { background: var(--accent2) !important; color: #fff !important; }

/* ── HERO ── */
#hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 120px 24px 80px;
  position: relative;
  overflow: hidden;
}

.hero-glow {
  position: absolute;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(ellipse, var(--glow-accent) 0%, transparent 70%);
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--accent-soft);
  border: 1px solid var(--border2);
  border-radius: 20px;
  font-size: 11.5px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.06em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 32px;
}

.hero-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(42px, 7vw, 80px);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1.05;
  color: var(--text);
  max-width: 820px;
  margin-bottom: 24px;
}

h1 em {
  font-style: italic;
  color: var(--accent);
  font-weight: 700;
}

.hero-sub {
  font-size: clamp(15px, 2vw, 18px);
  color: var(--text-muted);
  max-width: 520px;
  line-height: 1.7;
  margin-bottom: 40px;
  font-weight: 300;
}

.hero-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 64px;
}

.btn-primary {
  padding: 14px 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  letter-spacing: 0.01em;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary:hover { background: var(--accent2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,112,42,0.3); }

.btn-ghost {
  padding: 14px 28px;
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border2);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
